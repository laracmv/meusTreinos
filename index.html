<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Treinos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
  --accent:#c8f135;--accent-dim:rgba(200,241,53,0.12);
  --orange:#f4a336;--orange-dim:rgba(244,163,54,0.12);
  --mob:#a78bfa;--mob-dim:rgba(167,139,250,0.12);--mob-border:rgba(167,139,250,0.3);
  --text:#f0f0f0;--muted:#888;--tag-bg:#252525;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0 0 80px;}

header{padding:2rem 1.5rem 1.2rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;display:flex;align-items:center;gap:8px;justify-content:space-between;flex-wrap:wrap;}
.logo{font-family:'DM Mono',monospace;font-size:1rem;color:var(--accent);letter-spacing:-0.02em;}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.hbtn{border-radius:40px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer;padding:7px 15px;transition:all 0.2s;white-space:nowrap;}
.hbtn-outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.hbtn-outline:hover{color:var(--text);border-color:#555;}
.hbtn-outline.active{background:var(--orange-dim);color:var(--orange);border-color:rgba(244,163,54,0.35);}
.hbtn-fill{background:var(--accent);color:#0f0f0f;border:none;}
.hbtn-fill:hover{opacity:0.85;}

.tabs{display:flex;padding:0 1.5rem;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 18px;cursor:pointer;font-size:0.82rem;font-family:'DM Mono',monospace;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover{color:var(--text);}

.workout-panel{display:none;padding:1.2rem 1.5rem;}
.workout-panel.active{display:block;}
.workout-title{font-size:1.5rem;font-weight:600;margin-bottom:0.2rem;}
.workout-subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:1.2rem;}

/* Card */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0;overflow:hidden;transition:border-color 0.2s;}
.exercise-card.mobility{border-color:var(--mob-border);background:rgba(167,139,250,0.04);}
.exercise-card:hover{border-color:#3e3e3e;}
.exercise-card.mobility:hover{border-color:var(--mob);}
.exercise-header{padding:.9rem 1.1rem;display:flex;align-items:flex-start;gap:.8rem;cursor:pointer;user-select:none;}
.ex-num{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);background:var(--tag-bg);padding:3px 7px;border-radius:4px;margin-top:2px;flex-shrink:0;}
.mobility .ex-num{color:var(--mob);background:var(--mob-dim);}
.ex-info{flex:1;min-width:0;}
.ex-name{font-weight:500;font-size:0.92rem;line-height:1.3;margin-bottom:5px;}
.ex-meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.tag{background:var(--tag-bg);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;}
.tag.series{color:var(--accent);border-color:rgba(200,241,53,0.25);background:var(--accent-dim);}
.tag.mob-tag{color:var(--mob);border-color:var(--mob-border);background:var(--mob-dim);}
.tag.rest-tag{color:var(--muted);border-color:var(--border);}
.ex-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.predio-chip{display:inline-flex;align-items:center;gap:4px;background:transparent;border:1px solid rgba(244,163,54,0.35);color:var(--orange);font-size:0.7rem;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.predio-chip:hover{background:var(--orange-dim);}
.predio-chip.active{background:var(--orange-dim);border-color:var(--orange);}
.expand-icon{color:var(--muted);font-size:1.1rem;margin-top:2px;transition:transform 0.25s;flex-shrink:0;}
.exercise-card.open .expand-icon{transform:rotate(180deg);}
.exercise-body{display:none;padding:0 1.1rem 1.1rem;border-top:1px solid var(--border);}
.exercise-card.open .exercise-body{display:block;}

/* Image */
.ex-image-wrap{margin:10px 0 12px;border-radius:8px;overflow:hidden;background:var(--surface2);height:160px;position:relative;}
.ex-image-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.ex-image-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.78rem;font-family:'DM Mono',monospace;flex-direction:column;gap:6px;}
.ex-image-placeholder span{font-size:1.5rem;}

/* Load */
.load-row{display:flex;align-items:center;gap:10px;padding:10px 0 12px;}
.load-label{font-size:0.78rem;color:var(--muted);min-width:55px;}
.load-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:.95rem;padding:7px 10px;width:85px;transition:border-color 0.2s;text-align:center;}
.load-input:focus{outline:none;border-color:var(--accent);}
.load-unit{font-size:0.78rem;color:var(--muted);}
.series-loads{padding:10px 0 12px;}
.series-loads-title{font-size:0.72rem;color:var(--muted);margin-bottom:8px;font-family:'DM Mono',monospace;}
.series-grid{display:flex;flex-direction:column;gap:7px;}
.series-row{display:flex;align-items:center;gap:9px;}
.series-label{font-size:0.75rem;font-family:'DM Mono',monospace;color:var(--muted);min-width:64px;}
.series-label .rep-range{display:block;font-size:0.66rem;color:#555;margin-top:1px;}
.series-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.88rem;padding:6px 9px;width:78px;transition:border-color 0.2s;text-align:center;}
.series-input:focus{outline:none;border-color:var(--accent);}

/* Buttons row */
.body-buttons{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.icon-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text);font-size:0.78rem;font-family:'DM Sans',sans-serif;padding:6px 13px;border-radius:8px;text-decoration:none;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.icon-btn.yt:hover{border-color:#e63946;color:#e63946;}
.icon-btn.edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.del-btn:hover{border-color:#e63946;color:#e63946;}
.icon-btn.predio-btn{color:var(--orange);border-color:rgba(244,163,54,0.35);}
.icon-btn.predio-btn.active{background:var(--orange-dim);border-color:var(--orange);}
.icon-btn svg{width:13px;height:13px;flex-shrink:0;}

/* Sub section — shown per card via toggle */
.sub-section{margin-top:10px;border-top:1px dashed rgba(244,163,54,0.3);padding-top:10px;display:none;}
.sub-section.visible{display:block;}
.sub-label{font-size:0.7rem;font-family:'DM Mono',monospace;color:var(--orange);margin-bottom:5px;}
.sub-name{font-size:0.86rem;font-weight:500;color:var(--text);margin-bottom:3px;}
.sub-tip{font-size:0.76rem;color:var(--muted);line-height:1.5;}

/* Rest */
.rest-wrap{padding:6px 0;}
.rest-block{display:flex;align-items:center;gap:0;}
.rest-line{flex:1;height:1px;background:var(--border);}
.rest-pill{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 11px;white-space:nowrap;}

/* Biset */
.biset-label{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--orange);background:var(--orange-dim);border:1px solid rgba(244,163,54,0.3);border-radius:4px 4px 0 0;padding:3px 11px;display:inline-block;margin-left:18px;}
.biset-connector{display:flex;align-items:stretch;gap:0;margin:0;}
.biset-bar{width:3px;background:var(--orange);flex-shrink:0;margin-left:18px;}
.biset-card-wrap{flex:1;}
.biset-rest{font-size:0.68rem;font-family:'DM Mono',monospace;color:var(--orange);padding:4px 0 4px 26px;}

/* Add exercise button */
.add-ex-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1px dashed var(--border);border-radius:12px;background:transparent;color:var(--muted);font-size:0.82rem;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:12px;transition:all 0.2s;}
.add-ex-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-box{background:#1e1e1e;border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;padding:1.5rem;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:600;margin-bottom:1.2rem;}
.form-group{margin-bottom:1rem;}
.form-label{font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;display:block;margin-bottom:5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:9px 12px;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
.form-select{appearance:none;}
.form-textarea{resize:vertical;min-height:60px;}
.form-check{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--muted);cursor:pointer;}
.form-check input{width:16px;height:16px;accent-color:var(--accent);}
.series-edit-grid{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.series-edit-row{display:flex;gap:8px;align-items:center;}
.series-edit-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.82rem;padding:6px 9px;}
.series-edit-row input:focus{outline:none;border-color:var(--accent);}
.series-edit-row button{background:transparent;border:1px solid var(--border);color:#e63946;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:0.8rem;}
.add-series-btn{background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:0.78rem;cursor:pointer;width:100%;margin-top:4px;transition:all 0.2s;}
.add-series-btn:hover{border-color:var(--accent);color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:1.2rem;justify-content:flex-end;}
.modal-btn{padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
.modal-btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);}
.modal-btn-cancel:hover{color:var(--text);}
.modal-btn-save{background:var(--accent);border:none;color:#0f0f0f;}
.modal-btn-save:hover{opacity:0.85;}
.modal-btn-danger{background:transparent;border:1px solid #e63946;color:#e63946;margin-right:auto;}
.modal-btn-danger:hover{background:rgba(230,57,70,0.1);}

.saved-notice{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0f0f0f;font-weight:600;font-size:0.82rem;padding:9px 22px;border-radius:40px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.saved-notice.show{opacity:1;}

/* Workout mode */
.workout-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.98);backdrop-filter:blur(10px);border-top:2px solid var(--accent);padding:12px 1.2rem;align-items:center;gap:12px;}
.workout-bar.active{display:flex;}
.timer-display{font-family:'DM Mono',monospace;font-size:1.8rem;color:var(--accent);font-weight:500;min-width:82px;letter-spacing:0.05em;}
.workout-bar-mid{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.workout-progress-text{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;}
.progress-dots{display:flex;gap:3px;flex-wrap:wrap;}
.progress-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background 0.2s;}
.progress-dot.done{background:var(--accent);}
.finish-btn{background:#e63946;color:#fff;border:none;padding:9px 16px;border-radius:40px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;transition:opacity 0.2s;white-space:nowrap;flex-shrink:0;}
.finish-btn:hover{opacity:0.85;}
body.workout-mode-on{padding-bottom:80px;}
.ex-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:none;transition:all 0.15s;margin-top:1px;}
.workout-mode-on .ex-check{display:flex;align-items:center;justify-content:center;}
.ex-check.done{background:var(--accent);border-color:var(--accent);}
.ex-check.done::after{content:'✓';font-size:0.72rem;color:#0f0f0f;font-weight:700;}
.exercise-card.done-card{opacity:0.45;}
.exercise-card.done-card .ex-name{text-decoration:line-through;}

/* Card shake */
@keyframes card-shake{
  0%{transform:translateX(0);}
  15%{transform:translateX(-8px);}
  30%{transform:translateX(7px);}
  45%{transform:translateX(-6px);}
  60%{transform:translateX(5px);}
  75%{transform:translateX(-3px);}
  100%{transform:translateX(0);}
}
.card-shaking{animation:card-shake 0.45s ease-out;}

/* Dino hit — 3 frame image animation */
.dino-hit{
  position:absolute;
  left:8px;
  top:50%;
  transform:translateY(-50%) translateX(-140px);
  width:80px;
  height:80px;
  pointer-events:none;
  z-index:100;
  filter:drop-shadow(0 0 6px rgba(200,241,53,0.5));
  animation:dino-run 1.4s ease-out forwards;
}
.dino-hit img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
@keyframes dino-run{
  0%  {opacity:0; transform:translateY(-50%) translateX(-140px);}
  20% {opacity:1; transform:translateY(-50%) translateX(20px);}
  38% {opacity:1; transform:translateY(-60%) translateX(40px) rotate(-12deg) scale(1.25);}
  52% {opacity:1; transform:translateY(-42%) translateX(35px) rotate(8deg) scale(1.15);}
  65% {opacity:1; transform:translateY(-50%) translateX(40px) scale(1.05);}
  82% {opacity:1; transform:translateY(-50%) translateX(10px);}
  100%{opacity:0; transform:translateY(-50%) translateX(-120px);}
}

/* Celebration */
.celebration-overlay{position:fixed;inset:0;z-index:1000;pointer-events:none;}
.firework{position:absolute;border-radius:50%;}
@keyframes fw{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}
.dino-wrap{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:1001;text-align:center;pointer-events:none;animation:dino-bounce 0.4s ease infinite alternate;}
@keyframes dino-bounce{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(-12px);}}
.dino-emoji{font-size:4rem;display:block;}
.dino-label{font-size:0.8rem;font-family:'DM Mono',monospace;color:var(--accent);margin-top:4px;}

/* Summary modal */
.summary-grid{display:flex;flex-direction:column;gap:8px;margin:1rem 0;}
.summary-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--surface2);border-radius:8px;gap:8px;}
.summary-ex{font-size:0.82rem;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.summary-delta{font-size:0.78rem;font-family:'DM Mono',monospace;font-weight:600;flex-shrink:0;}
.delta-up{color:#c8f135;}
.delta-down{color:#e63946;}
.delta-same{color:#888;}
.summary-time{text-align:center;font-family:'DM Mono',monospace;font-size:2rem;color:var(--accent);font-weight:500;margin:0.5rem 0 1rem;}

/* Progress tab */
.prog-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.2rem;}
.prog-title{font-size:1.5rem;font-weight:600;}
.prog-sync-info{font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;}
.prog-sync-info span{color:var(--accent);}
.prog-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
.prog-filter-label{font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;}
.filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.82rem;padding:7px 12px;cursor:pointer;}
.filter-select:focus{outline:none;border-color:var(--accent);}
.prog-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:0.9rem;line-height:1.8;}
.prog-empty strong{display:block;font-size:1.1rem;color:var(--text);margin-bottom:8px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:14px;}
.chart-card-title{font-size:0.82rem;font-weight:500;color:var(--text);margin-bottom:4px;}
.chart-card-sub{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:12px;}
.chart-wrap{position:relative;height:180px;}
.prog-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem;}
.stat-label{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px;}
.stat-value{font-size:1.4rem;font-weight:600;color:var(--accent);}
.stat-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.prog-loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem;font-family:'DM Mono',monospace;}
.prog-section-title{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;margin:1.5rem 0 0.8rem;}
.sync-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.78rem;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.2s;}
.sync-btn:hover{border-color:var(--accent);color:var(--accent);}
.sync-btn.syncing{border-color:var(--accent);color:var(--accent);opacity:0.7;}
</style>
</head>
<body>
<header>
  <div class="logo">// meus treinos</div>
  <div class="header-right">
    <button class="hbtn hbtn-outline" id="startBtn" onclick="startWorkout()">▶ Iniciar Treino</button>
    <button class="hbtn hbtn-fill" onclick="saveAll()">Salvar cargas</button>
  </div>
</header>
<div class="workout-bar" id="workout-bar">
  <div class="timer-display" id="timer">00:00</div>
  <div class="workout-bar-mid">
    <div class="workout-progress-text" id="workout-progress-text">0 / 0 exercícios</div>
    <div class="progress-dots" id="progress-dots"></div>
  </div>
  <button class="finish-btn" onclick="finishWorkout()">✓ Finalizar</button>
</div>
<div class="workout-bar-spacer" id="workout-bar-spacer"></div>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div id="modal-root"></div>
<div class="saved-notice" id="saved-notice">✓ Salvo!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbx07M6zoHa89YOEK9tBbiaCj7z1zE7NWl8-u0ybXCZ_bJZEjCFHZS1R4ILLwVe0_RHk8g/exec';

let editingTreino=null, editingIndex=null;
let progCharts={};

// ── DATA ────────────────────────────────────────────────────────────────────
const defaultTreinos=[
  {
    id:'A',nome:'Treino A',descricao:'Mobilidade + Quadríceps / Parte anterior da perna',
    exercicios:[

// ── STATE ───────────────────────────────────────────────────────────────────
function loadTreinosCache(){
  try{const s=localStorage.getItem('treino_data');return s?JSON.parse(s):JSON.parse(JSON.stringify(defaultTreinos));}
  catch{return JSON.parse(JSON.stringify(defaultTreinos));}
}
function loadCargas(){try{return JSON.parse(localStorage.getItem('treino_cargas')||'{}');}catch{return {};}}

let treinos=loadTreinosCache();
let saved=loadCargas();
let syncStatus='cache'; // 'cache' | 'synced' | 'syncing' | 'error'

function setSyncStatus(s, msg){
  syncStatus=s;
  const el=document.getElementById('sync-status');
  if(!el)return;
  const map={
    synced:`<span style="color:var(--accent)">✓ sincronizado</span> às ${msg}`,
    syncing:`<span style="color:var(--orange)">⟳ sincronizando...</span>`,
    cache:`<span style="color:var(--muted)">📱 cache local</span> — sem internet`,
    error:`<span style="color:#e63946">⚠ erro ao sincronizar</span>`
  };
  el.innerHTML=map[s]||msg;
}

// Save treinos: local cache + background sync to Sheets
function saveTreinos(t){
  localStorage.setItem('treino_data',JSON.stringify(t));
  setSyncStatus('syncing');
  fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({type:'save_treinos',treinos:t})
  }).then(r=>r.json()).then(res=>{
    if(res.ok){
      const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      localStorage.setItem('last_sync',ts);
      setSyncStatus('synced',ts);
    } else setSyncStatus('error');
  }).catch(()=>setSyncStatus('cache'));
}

// On load: try to fetch treinos from Sheets, fall back to cache
function initTreinos(){
  setSyncStatus('syncing');
  fetch(SCRIPT_URL+'?t='+Date.now())
    .then(r=>r.json())
    .then(res=>{
      if(res.ok){
        if(res.treinos){
          treinos=res.treinos;
          localStorage.setItem('treino_data',JSON.stringify(treinos));
        }
        if(res.rows){
          sheetsData=res.rows.map(r=>({data:r[0],treino:r[1],exercicio:r[2],serie:r[3],carga:parseFloat(r[4])||0,key:r[5]}));
          localStorage.setItem('sheets_cache',JSON.stringify(sheetsData));
        }
        const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        localStorage.setItem('last_sync',ts);
        setSyncStatus('synced',ts);
        render();
      } else setSyncStatus('error');
    })
    .catch(()=>{
      setSyncStatus('cache');
    });
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function nextKey(treinoId){
  const t=treinos.find(t=>t.id===treinoId);
  const keys=t.exercicios.map(e=>e.carga_key).filter(k=>k.startsWith(treinoId));
  for(let i=1;i<100;i++){const k=treinoId+String(i).padStart(2,'0');if(!keys.includes(k))return k;}
}
function nextNum(treinoId){
  const t=treinos.find(t=>t.id===treinoId);
  return String(t.exercicios.length+1).padStart(2,'0');
}
function renumberExercises(exArr){
  exArr.forEach((e,i)=>e.num=String(i+1).padStart(2,'0'));
}

function saveAll(){
  const c={};
  document.querySelectorAll('.load-input,.series-input').forEach(inp=>{if(inp.value)c[inp.dataset.key]=inp.value;});
  localStorage.setItem('treino_cargas',JSON.stringify(c));
  saved=c;

  const activeTab=document.querySelector('.tab.active');
  const treinoNome=activeTab?activeTab.textContent:'';
  const entradas=[];
  const hoje=new Date().toLocaleDateString('pt-BR');

  treinos.forEach(treino=>{
    treino.exercicios.forEach(ex=>{
      if(ex.series_cargas){
        ex.series_cargas.forEach((s,si)=>{
          const key=ex.carga_key+'_s'+si;
          if(c[key]) entradas.push({exercicio:ex.nome,serie:s.label,carga:parseFloat(c[key]),key});
        });
      } else {
        if(c[ex.carga_key]) entradas.push({exercicio:ex.nome,serie:'Geral',carga:parseFloat(c[ex.carga_key]),key:ex.carga_key});
      }
    });
  });

  if(entradas.length>0){
    setSyncStatus('syncing');
    fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({type:'save_historico',data:hoje,treino:treinoNome,entradas}),
    }).then(r=>r.json()).then(res=>{
      if(res.ok){
        const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        localStorage.setItem('last_sync',ts);
        setSyncStatus('synced',ts);
      } else setSyncStatus('error');
    }).catch(()=>setSyncStatus('cache'));
  }

  const n=document.getElementById('saved-notice');
  n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2000);
}

function toggleCard(id){document.getElementById(id).classList.toggle('open');}

function togglePredio(key){
  const card=document.getElementById('card-'+key);
  const btn=document.getElementById('prediobtn-'+key);
  const nameEl=document.getElementById('name-'+key);
  const seriesTagEl=document.getElementById('series-tag-'+key);
  const imgWrap=document.getElementById('img-wrap-'+key);
  const ytBtn=document.getElementById('yt-btn-'+key);
  const sub=document.getElementById('sub-'+key);
  if(!card||!btn)return;

  const isPredi=btn.classList.toggle('active');

  if(isPredi){
    // swap to predio version
    if(card.dataset.subNome) nameEl.textContent=card.dataset.subNome;
    if(card.dataset.subImg) imgWrap.innerHTML=`<img src="${card.dataset.subImg}" alt="prédio" loading="lazy" onerror="this.parentElement.innerHTML='<div class=ex-image-placeholder><span>📷</span>sem foto</div>'">`;
    if(card.dataset.subVideo) ytBtn.href=card.dataset.subVideo;
    btn.textContent='🏋 academia';
    if(sub) sub.classList.add('visible');
  } else {
    // swap back to academia
    if(card.dataset.origNome) nameEl.textContent=card.dataset.origNome;
    if(card.dataset.origImg) imgWrap.innerHTML=`<img src="${card.dataset.origImg}" alt="academia" loading="lazy" onerror="this.parentElement.innerHTML='<div class=ex-image-placeholder><span>📷</span>sem foto</div>'">`;
    else imgWrap.innerHTML=`<div class="ex-image-placeholder"><span>📷</span>sem foto</div>`;
    if(card.dataset.origVideo) ytBtn.href=card.dataset.origVideo;
    btn.textContent='🏠 prédio';
    if(sub) sub.classList.remove('visible');
  }
}

// ── WORKOUT MODE ─────────────────────────────────────────────────────────────
let workoutActive=false;
let workoutStart=null;
let timerInterval=null;
let doneKeys=new Set();

function startWorkout(){
  workoutActive=true;
  workoutStart=Date.now();
  doneKeys.clear();

  document.getElementById('workout-bar').classList.add('active');
  document.getElementById('startBtn').textContent='⏹ Parar';
  document.getElementById('startBtn').onclick=cancelWorkout;
  document.body.classList.add('workout-mode-on');

  timerInterval=setInterval(()=>{
    const elapsed=Math.floor((Date.now()-workoutStart)/1000);
    const m=Math.floor(elapsed/60).toString().padStart(2,'0');
    const s=(elapsed%60).toString().padStart(2,'0');
    document.getElementById('timer').textContent=m+':'+s;
  },1000);

  updateWorkoutProgress();
}

function cancelWorkout(){
  stopTimer();
  workoutActive=false;
  doneKeys.clear();
  document.getElementById('workout-bar').classList.remove('active');
  document.getElementById('startBtn').textContent='▶ Iniciar Treino';
  document.getElementById('startBtn').onclick=startWorkout;
  document.body.classList.remove('workout-mode-on');
  document.querySelectorAll('.ex-check').forEach(c=>c.classList.remove('done'));
  document.querySelectorAll('.exercise-card').forEach(c=>{
    c.classList.remove('done-card','card-shaking');
    c.style.overflow='';
  });
}

function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

function toggleDone(key,cardId){
  if(!workoutActive)return;
  const check=document.getElementById('check-'+key);
  const card=document.getElementById(cardId);
  if(doneKeys.has(key)){
    doneKeys.delete(key);
    check.classList.remove('done');
    card.classList.remove('done-card');
  } else {
    doneKeys.add(key);
    check.classList.add('done');
    card.classList.add('done-card');
    // Dino charges in with 3-frame animation
    card.style.position='relative';
    card.style.overflow='visible';
    const dino=document.createElement('div');
    dino.className='dino-hit';
    const dinoBase='./assets/dino/';
    const img=document.createElement('img');
    img.src=dinoBase+'dino1.png';
    dino.appendChild(img);
    card.appendChild(dino);
    // Cycle frames: dino1 → dino2 → dino3 at impact → back to dino1
    setTimeout(()=>img.src=dinoBase+'dino2.png', 300);
    setTimeout(()=>img.src=dinoBase+'dino3.png', 530); // impact frame
    setTimeout(()=>{
      card.classList.add('card-shaking');
      setTimeout(()=>card.classList.remove('card-shaking'),450);
    },590);
    setTimeout(()=>img.src=dinoBase+'dino1.png', 780);
    setTimeout(()=>dino.remove(),1400);
  }
  updateWorkoutProgress();
}

function updateWorkoutProgress(){
  // Only count cards in the currently active panel
  const activePanel=document.querySelector('.workout-panel.active');
  const allCards=activePanel?activePanel.querySelectorAll('.exercise-card'):[];
  const total=allCards.length;
  const done=[...allCards].filter(c=>{
    const key=c.id.replace('card-','');
    return doneKeys.has(key);
  }).length;
  document.getElementById('workout-progress-text').textContent=`${done} / ${total} exercícios`;
  const dots=document.getElementById('progress-dots');
  dots.innerHTML=[...allCards].map(c=>{
    const key=c.id.replace('card-','');
    return `<div class="progress-dot${doneKeys.has(key)?' done':''}"></div>`;
  }).join('');
}

function launchCelebration(){
  // Fireworks
  const overlay=document.createElement('div');
  overlay.className='celebration-overlay';
  document.body.appendChild(overlay);

  const colors=['#c8f135','#f4a336','#e63946','#a78bfa','#38bdf8','#fb7185','#facc15'];
  for(let i=0;i<80;i++){
    setTimeout(()=>{
      const fw=document.createElement('div');
      fw.className='firework';
      const x=10+Math.random()*80;
      const y=10+Math.random()*70;
      const tx=(Math.random()-0.5)*200+'px';
      const ty=(Math.random()-0.5)*200+'px';
      fw.style.cssText=`left:${x}%;top:${y}%;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${tx};--ty:${ty};animation:fw ${0.5+Math.random()*0.8}s ease-out forwards;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;`;
      overlay.appendChild(fw);
    },Math.random()*2000);
  }

  // Dino
  const dino=document.createElement('div');
  dino.className='dino-wrap';
  dino.innerHTML=`<img src="./assets/dino/dino3.png" style="width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(200,241,53,0.8))"><div class="dino-label">treino concluído!</div>`;
  document.body.appendChild(dino);

  setTimeout(()=>{
    overlay.remove();
    dino.remove();
  },3500);
}

function finishWorkout(){
  stopTimer();
  const elapsed=Math.floor((Date.now()-workoutStart)/1000);
  const m=Math.floor(elapsed/60).toString().padStart(2,'0');
  const s=(elapsed%60).toString().padStart(2,'0');
  const totalTime=m+':'+s;

  const c={};
  document.querySelectorAll('.load-input,.series-input').forEach(inp=>{if(inp.value)c[inp.dataset.key]=inp.value;});
  localStorage.setItem('treino_cargas',JSON.stringify(c));
  saved=c;

  const activeTab=document.querySelector('.tab.active');
  const treinoNome=activeTab?activeTab.textContent:'';
  const hoje=new Date().toLocaleDateString('pt-BR');
  const entradas=[];
  treinos.forEach(treino=>{
    treino.exercicios.forEach(ex=>{
      if(ex.series_cargas){
        ex.series_cargas.forEach((s,si)=>{
          const key=ex.carga_key+'_s'+si;
          if(c[key]) entradas.push({exercicio:ex.nome,serie:s.label,carga:parseFloat(c[key]),key});
        });
      } else {
        if(c[ex.carga_key]) entradas.push({exercicio:ex.nome,serie:'Geral',carga:parseFloat(c[ex.carga_key]),key:ex.carga_key});
      }
    });
  });

  const summary=entradas.map(e=>{
    const prev=sheetsData.filter(r=>r.key===e.key).slice(-1)[0];
    const delta=prev?e.carga-prev.carga:null;
    return {...e,delta};
  }).filter(e=>e.carga>0);

  if(entradas.length>0){
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({type:'save_historico',data:hoje,treino:treinoNome,entradas})})
      .then(r=>r.json()).then(res=>{
        if(res.ok){
          const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          localStorage.setItem('last_sync',ts);
          setSyncStatus('synced',ts);
          sheetsData=[...sheetsData,...entradas.map(e=>({data:hoje,treino:treinoNome,...e}))];
          localStorage.setItem('sheets_cache',JSON.stringify(sheetsData));
        }
      }).catch(()=>setSyncStatus('cache'));
  }

  cancelWorkout();
  launchCelebration();
  setTimeout(()=>showSummaryModal(totalTime,summary),1200);
}

function showSummaryModal(time,summary){
  const rows=summary.map(e=>{
    let deltaHtml='';
    if(e.delta===null) deltaHtml=`<span class="summary-delta delta-same">novo</span>`;
    else if(e.delta>0) deltaHtml=`<span class="summary-delta delta-up">↑ +${e.delta.toFixed(1)}kg</span>`;
    else if(e.delta<0) deltaHtml=`<span class="summary-delta delta-down">↓ ${e.delta.toFixed(1)}kg</span>`;
    else deltaHtml=`<span class="summary-delta delta-same">= estável</span>`;
    const label=e.serie==='Geral'?e.exercicio.split('(')[0].trim():`${e.exercicio.split('(')[0].trim()} · ${e.serie}`;
    return `<div class="summary-row"><span class="summary-ex">${label}</span>${deltaHtml}</div>`;
  }).join('');

  const html=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal-box">
  <div class="modal-title">🏁 Treino finalizado!</div>
  <div class="summary-time">${time}</div>
  <div style="font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:0.8rem;">✓ cargas salvas automaticamente</div>
  ${rows.length?`<div class="summary-grid">${rows}</div>`:'<div style="color:var(--muted);font-size:0.85rem;padding:1rem 0">Nenhuma carga registrada neste treino.</div>'}
  <div class="modal-actions"><button class="modal-btn modal-btn-save" onclick="closeModal()">Fechar</button></div>
</div></div>`;
  document.getElementById('modal-root').innerHTML=html;
}

// ── PROGRESS ────────────────────────────────────────────────────────────────
let sheetsData=[];

function fetchAndRenderProgress(){
  const btn=document.getElementById('sync-btn');
  if(btn){btn.textContent='⟳ buscando...';btn.classList.add('syncing');}
  const url=SCRIPT_URL+'?t='+Date.now();
  fetch(url).then(r=>r.json()).then(res=>{
    // rows: [data, treino, exercicio, serie, carga, key]
    sheetsData=(res.rows||[]).slice(1).map(r=>({
      data:r[0],treino:r[1],exercicio:r[2],serie:r[3],carga:parseFloat(r[4])||0,key:r[5]
    }));
    localStorage.setItem('sheets_cache',JSON.stringify(sheetsData));
    const ts=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('last_sync',ts);
    const statusEl=document.getElementById('sync-status');
    if(statusEl)statusEl.innerHTML=`última sincronização: <span>${ts}</span>`;
    if(btn){btn.textContent='⟳ atualizar do Sheets';btn.classList.remove('syncing');}
    renderProgress();
  }).catch(err=>{
    if(btn){btn.textContent='⚠ erro — tente novamente';btn.classList.remove('syncing');}
    console.error(err);
  });
}

function renderProgress(){
  // Load from cache if sheetsData empty
  if(!sheetsData.length){
    try{const c=localStorage.getItem('sheets_cache');if(c)sheetsData=JSON.parse(c);}catch{}
  }

  const exSelect=document.getElementById('prog-ex-select');
  const periodDays=parseInt(document.getElementById('prog-period-select')?.value||'30');
  const filterEx=exSelect?exSelect.value:'';

  // Populate exercise selector
  const allExNames=[...new Set(sheetsData.map(r=>r.exercicio))].sort();
  const curVal=exSelect?exSelect.value:'';
  if(exSelect){
    exSelect.innerHTML='<option value="">todos</option>'+allExNames.map(n=>`<option value="${n}"${n===curVal?' selected':''}>${n}</option>`).join('');
  }

  const content=document.getElementById('prog-content');
  if(!sheetsData.length){
    content.innerHTML=`<div class="prog-empty"><strong>Sem dados ainda</strong>Salve suas cargas durante o treino e clique em "atualizar do Sheets".</div>`;
    return;
  }

  // Filter by period
  const cutoff=periodDays>0?Date.now()-periodDays*86400000:0;
  const filtered=sheetsData.filter(r=>{
    if(periodDays>0){
      const parts=r.data.split('/');
      if(parts.length===3){
        const d=new Date(parts[2],parts[1]-1,parts[0]);
        if(d.getTime()<cutoff)return false;
      }
    }
    if(filterEx&&r.exercicio!==filterEx)return false;
    return true;
  });

  if(!filtered.length){
    content.innerHTML=`<div class="prog-empty"><strong>Nenhum dado no período</strong>Tente um período maior ou outro exercício.</div>`;
    return;
  }

  // Group by exercicio+serie
  const groups={};
  filtered.forEach(r=>{
    const k=r.exercicio+'||'+r.serie;
    if(!groups[k])groups[k]={exercicio:r.exercicio,serie:r.serie,entries:[]};
    groups[k].entries.push({data:r.data,carga:r.carga});
  });

  // Stats
  const allCargas=filtered.map(r=>r.carga).filter(c=>c>0);
  const maxCarga=allCargas.length?Math.max(...allCargas):0;
  const maxEx=filtered.find(r=>r.carga===maxCarga);
  const totalSessoes=new Set(filtered.map(r=>r.data)).size;
  const totalExercicios=new Set(filtered.map(r=>r.exercicio)).size;

  // Destroy old charts
  Object.values(progCharts).forEach(c=>{try{c.destroy();}catch{}});
  progCharts={};

  let html=`<div class="prog-stats-grid">
  <div class="stat-card"><div class="stat-label">sessões registradas</div><div class="stat-value">${totalSessoes}</div><div class="stat-sub">no período</div></div>
  <div class="stat-card"><div class="stat-label">exercícios monitorados</div><div class="stat-value">${totalExercicios}</div></div>
  <div class="stat-card"><div class="stat-label">maior carga</div><div class="stat-value">${maxCarga}kg</div><div class="stat-sub">${maxEx?maxEx.exercicio.split('(')[0].trim():''}</div></div>
</div>
<div class="prog-section-title">evolução por exercício</div>`;

  const chartIds=[];
  Object.values(groups).forEach((g,gi)=>{
    // Sort entries by date
    const entries=g.entries.slice().sort((a,b)=>{
      const pa=a.data.split('/'),pb=b.data.split('/');
      return new Date(pa[2],pa[1]-1,pa[0])-new Date(pb[2],pb[1]-1,pb[0]);
    });
    const labels=entries.map(e=>e.data);
    const valores=entries.map(e=>e.carga);
    const first=valores[0]||0,last=valores[valores.length-1]||0;
    const delta=last-first;
    const deltaStr=delta>0?`+${delta.toFixed(1)}kg`:delta<0?`${delta.toFixed(1)}kg`:'estável';
    const deltaColor=delta>0?'#c8f135':delta<0?'#e63946':'#888';
    const cid='chart-'+gi;
    chartIds.push({cid,labels,valores});
    html+=`<div class="chart-card">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;">
    <div><div class="chart-card-title">${g.exercicio}</div><div class="chart-card-sub">${g.serie}</div></div>
    <div style="font-size:0.78rem;font-family:'DM Mono',monospace;color:${deltaColor};font-weight:500;">${deltaStr}</div>
  </div>
  <div class="chart-wrap"><canvas id="${cid}"></canvas></div>
</div>`;
  });

  content.innerHTML=html;

  // Draw charts after DOM update
  requestAnimationFrame(()=>{
    chartIds.forEach(({cid,labels,valores})=>{
      const ctx=document.getElementById(cid);
      if(!ctx)return;
      progCharts[cid]=new Chart(ctx,{
        type:'line',
        data:{
          labels,
          datasets:[{
            data:valores,
            borderColor:'#c8f135',
            backgroundColor:'rgba(200,241,53,0.08)',
            borderWidth:2,
            pointBackgroundColor:'#c8f135',
            pointRadius:4,
            pointHoverRadius:6,
            fill:true,
            tension:0.3
          }]
        },
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} kg`}}},
          scales:{
            x:{ticks:{color:'#666',font:{size:10},maxRotation:0},grid:{color:'#1e1e1e'}},
            y:{ticks:{color:'#666',font:{size:10},callback:v=>v+'kg'},grid:{color:'#1e1e1e'},beginAtZero:false}
          }
        }
      });
    });
  });
}

// ── MODAL ───────────────────────────────────────────────────────────────────
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function openAdd(treinoId){
  editingTreino=treinoId; editingIndex=null;
  showModal({nome:'',series:'3 x 10',series_cargas:null,mobility:false,video:'',img:'',sub:null,descanso:'1:00',descanso_label:''});
}

function openEdit(treinoId,idx){
  editingTreino=treinoId; editingIndex=idx;
  const t=treinos.find(t=>t.id===treinoId);
  showModal(JSON.parse(JSON.stringify(t.exercicios[idx])));
}

function showModal(ex){
  const isMulti=!!(ex.series_cargas&&ex.series_cargas.length>0);
  const seriesRowsHtml=(ex.series_cargas||[]).map((s,i)=>`
    <div class="series-edit-row" id="serow-${i}">
      <input placeholder="Label (ex: Série 1)" value="${s.label||''}" data-si="${i}" data-field="label">
      <input placeholder="Reps (ex: 10 a 12 reps)" value="${s.reps||''}" data-si="${i}" data-field="reps">
      <button onclick="removeSeriesRow(${i})">✕</button>
    </div>`).join('');

  const html=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
<div class="modal-box">
  <div class="modal-title">${editingIndex===null?'Novo exercício':'Editar exercício'}</div>
  <div class="form-group"><label class="form-label">Nome do exercício</label><input class="form-input" id="f-nome" value="${ex.nome||''}"></div>
  <div class="form-group"><label class="form-check"><input type="checkbox" id="f-mobility" ${ex.mobility?'checked':''}> Exercício de mobilidade (destaque roxo)</label></div>
  <div class="form-group"><label class="form-check"><input type="checkbox" id="f-biset" ${ex.biset_com_proximo?'checked':''}> Bi-set com o próximo exercício</label></div>
  <div class="form-group">
    <label class="form-check"><input type="checkbox" id="f-multi" ${isMulti?'checked':''} onchange="toggleMultiSeries()"> Séries com cargas diferentes</label>
  </div>
  <div id="single-series-wrap" style="display:${isMulti?'none':'block'}">
    <div class="form-group"><label class="form-label">Séries / repetições (ex: 3 x 10a12)</label><input class="form-input" id="f-series" value="${ex.series||''}"></div>
  </div>
  <div id="multi-series-wrap" style="display:${isMulti?'block':'none'}">
    <div class="form-label" style="margin-bottom:6px">Séries individuais</div>
    <div class="series-edit-grid" id="series-edit-grid">${seriesRowsHtml}</div>
    <button class="add-series-btn" onclick="addSeriesRow()">+ adicionar série</button>
  </div>
  <div class="form-group" style="margin-top:1rem"><label class="form-label">Descanso (ex: 1:00 ou 0:30)</label><input class="form-input" id="f-descanso" value="${ex.descanso||'1:00'}"></div>
  <div class="form-group"><label class="form-label">URL do vídeo (YouTube)</label><input class="form-input" id="f-video" value="${ex.video||''}"></div>
  <div class="form-group"><label class="form-label">URL da foto (Unsplash, imgur, etc.)</label><input class="form-input" id="f-img" value="${ex.img||''}"></div>
  <div class="form-group"><label class="form-label">Substituição no prédio — nome</label><input class="form-input" id="f-sub-nome" value="${ex.sub?ex.sub.nome:''}"></div>
  <div class="form-group"><label class="form-label">Substituição no prédio — dica</label><textarea class="form-textarea" id="f-sub-dica">${ex.sub?ex.sub.dica:''}</textarea></div>
  <div class="form-group"><label class="form-label">Substituição no prédio — URL vídeo</label><input class="form-input" id="f-sub-video" value="${ex.sub?ex.sub.video:''}"></div>
  <div class="modal-actions">
    ${editingIndex!==null?`<button class="modal-btn modal-btn-danger" onclick="confirmDeleteFromModal()">Remover</button>`:''}
    <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="modal-btn modal-btn-save" onclick="saveModal()">Salvar</button>
  </div>
</div></div>`;
  document.getElementById('modal-root').innerHTML=html;
}

function toggleMultiSeries(){
  const on=document.getElementById('f-multi').checked;
  document.getElementById('single-series-wrap').style.display=on?'none':'block';
  document.getElementById('multi-series-wrap').style.display=on?'block':'none';
  if(on&&!document.getElementById('series-edit-grid').children.length)addSeriesRow();
}

let _seriesCount=0;
function addSeriesRow(){
  const grid=document.getElementById('series-edit-grid');
  const i=_seriesCount++;
  const div=document.createElement('div');
  div.className='series-edit-row';
  div.id='serow-'+i;
  div.innerHTML=`<input placeholder="Label (ex: Série ${i+1})" data-si="${i}" data-field="label"><input placeholder="Reps (ex: 10 a 12 reps)" data-si="${i}" data-field="reps"><button onclick="this.parentElement.remove()">✕</button>`;
  grid.appendChild(div);
}
function removeSeriesRow(i){const el=document.getElementById('serow-'+i);if(el)el.remove();}

function getSeriesFromModal(){
  const rows=document.querySelectorAll('#series-edit-grid .series-edit-row');
  const result=[];
  rows.forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const label=inputs[0].value.trim();
    const reps=inputs[1].value.trim();
    if(label||reps)result.push({label:label||'Série',reps:reps||''});
  });
  return result;
}

function saveModal(){
  const t=treinos.find(t=>t.id===editingTreino);
  const isMulti=document.getElementById('f-multi').checked;
  const seriesList=isMulti?getSeriesFromModal():null;
  const subNome=document.getElementById('f-sub-nome').value.trim();
  const subDica=document.getElementById('f-sub-dica').value.trim();
  const subVideo=document.getElementById('f-sub-video').value.trim();
  const ex={
    nome:document.getElementById('f-nome').value.trim(),
    mobility:document.getElementById('f-mobility').checked,
    biset_com_proximo:document.getElementById('f-biset').checked,
    video:document.getElementById('f-video').value.trim(),
    img:document.getElementById('f-img').value.trim(),
    descanso:document.getElementById('f-descanso').value.trim()||'1:00',
    sub:(subNome||subDica)?{nome:subNome,dica:subDica,video:subVideo}:null,
  };
  if(isMulti){ex.series_cargas=seriesList;}
  else{ex.series=document.getElementById('f-series').value.trim();}

  if(editingIndex===null){
    ex.carga_key=nextKey(editingTreino);
    ex.num=nextNum(editingTreino);
    t.exercicios.push(ex);
  } else {
    ex.carga_key=t.exercicios[editingIndex].carga_key;
    ex.num=t.exercicios[editingIndex].num;
    t.exercicios[editingIndex]=ex;
  }
  saveTreinos(treinos);
  closeModal();
  render();
}

function confirmDelete(treinoId,idx){
  if(!confirm('Remover este exercício?'))return;
  const t=treinos.find(t=>t.id===treinoId);
  t.exercicios.splice(idx,1);
  renumberExercises(t.exercicios);
  saveTreinos(treinos);
  render();
}
function confirmDeleteFromModal(){
  if(!confirm('Remover este exercício?'))return;
  const t=treinos.find(t=>t.id===editingTreino);
  t.exercicios.splice(editingIndex,1);
  renumberExercises(t.exercicios);
  saveTreinos(treinos);
  closeModal();
  render();
}

function updateTag(input){
  const meta=input.closest('.exercise-card').querySelector('.ex-meta');
  let badge=meta.querySelector('.tag:not(.series):not(.mob-tag)');
  if(input.value){
    if(!badge){badge=document.createElement('span');badge.className='tag';meta.appendChild(badge);}
    badge.textContent='🏋 '+input.value+' kg';
  } else if(badge) badge.remove();
}
function updateMultiTag(baseKey,count){
  const meta=document.getElementById('meta-'+baseKey);
  const vals=[];
  for(let i=0;i<count;i++){const inp=document.querySelector('[data-key="'+baseKey+'_s'+i+'"]');if(inp&&inp.value)vals.push(inp.value);}
  let badge=meta.querySelector('.tag:not(.series):not(.mob-tag)');
  if(vals.length){
    if(!badge){badge=document.createElement('span');badge.className='tag';meta.appendChild(badge);}
    badge.textContent='🏋 '+vals.join('→')+' kg';
  } else if(badge) badge.remove();
}

// Boot: render from cache immediately, then fetch from Sheets in background
render();
initTreinos();
</script>
</body>
</html>
